name: Create Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew clean build --stacktrace

      - name: Get version from tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get mod jar path
        id: jar_path
        run: echo "JAR_PATH=$(ls build/libs/*.jar | head -1)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag_version.outputs.VERSION }}
          release_name: Release ${{ steps.tag_version.outputs.VERSION }}
          body: |
            GuildZip ${{ steps.tag_version.outputs.VERSION }}
            
            Download the mod JAR below and place it in your mods folder.
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.jar_path.outputs.JAR_PATH }}
          asset_name: GuildZip-${{ steps.tag_version.outputs.VERSION }}.jar
          asset_content_type: application/java-archive

